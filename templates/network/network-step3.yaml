AWSTemplateFormatVersion: "2010-09-09"
Description: "Network stack - VPC, Subnets"

# ==================================================
# パラメータ
# ==================================================
Parameters:
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: "VPC CIDR block"

  PublicSubnet1Cidr:
    Type: String
    Default: "10.0.1.0/24"
    Description: "Public subnet 1 CIDR block"

  PublicSubnet2Cidr:
    Type: String
    Default: "10.0.2.0/24"
    Description: "Public subnet 2 CIDR block"

# ==================================================
# リソース
# ==================================================
Resources:

  # --------------------------------------------------
  # VPC
  # --------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  # --------------------------------------------------
  # パブリックサブネット（Multi-AZ）
  # --------------------------------------------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-1a"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-1c"

